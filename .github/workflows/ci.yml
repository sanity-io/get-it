name: CI

on:
  # Build on pushes to release branches
  push:
    branches: [main]
  # Build on pull requests targeting release branches
  pull_request:
    branches: [main]
  # https://docs.github.com/en/actions/managing-workflow-runs/manually-running-a-workflow
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout

jobs:
  build:
    name: Build, lint and test coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - run: npx ls-engines
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run lint -- --quiet
      - run: pnpm run coverage

  test:
    name: Node.js ${{ matrix.node }} on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Run the testing suite on every supported Node.js version, on ubuntu since it's the fastest CI runner:
        #   22.12.0 - the minimum supported version (must match the `engines` field in package.json)
        #   24      - the active LTS release
        #   26      - the latest/current release
        os: [ubuntu-latest]
        node: ['22.12.0', '24', '26']
        # Additionally verify the active LTS release on the other major operating systems
        include:
          - os: macos-latest
            node: '24'
          - os: windows-latest
            node: '24'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: ${{ matrix.node }}
      - run: pnpm install
      - run: npx ls-engines
      - run: pnpm run build
      - run: pnpm test

  test-browser:
    name: Test Browser
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm run test:browser -- --coverage

  test-bun:
    name: Test Bun
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - uses: oven-sh/setup-bun@v2
      - run: pnpm run test:bun

  test-deno:
    name: Test Deno
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:deno

  test-happy-dom:
    name: Test Happy DOM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:happy-dom

  test-react-server:
    name: Test React Server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:react-server

  test-vercel-edge:
    name: Test Vercel Edge Runtime
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:vercel-edge -- --coverage

  test-workerd:
    name: Test workerd (Cloudflare Workers)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:workerd
