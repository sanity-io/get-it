allowBuilds:
  esbuild: true
overrides:
  # @types/node bundles undici-types@6, but we depend on undici@7 whose fetch
  # types use the newer (iterator-helper-bearing) FormData/Headers. Align the
  # global web types with our undici major so they don't clash. Dev-only: the
  # published types expose only our own FetchFunction, so consumers are unaffected.
  undici-types: ^7.27.1
