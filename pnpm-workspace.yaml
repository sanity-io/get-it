allowBuilds:
  esbuild: true
overrides:
  # @types/node bundles undici-types@6, but we depend on undici@8 whose fetch
  # types require the newer (helper-bearing) FormData/Headers. Align the global
  # web types with our undici major so they don't clash. Dev-only: the published
  # types expose only our own FetchFunction, so consumers are unaffected.
  undici-types: ^8.3.0
minimumReleaseAgeExclude:
  - '@sanity/pkg-utils@10.5.0'
